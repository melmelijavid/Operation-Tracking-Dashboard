<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Log in</title>
    <link rel="stylesheet" href="./login.css">
</head>

   <body>

  <div class="page">
    <img src="Images/nokia.svg" class="logo" alt="nokia"> 
    <div class="login-card">

      <div class="tabs">
        <button class="tab active">Sign In</button>
        <button class="tab">Sign Up</button>
        <div class="indicator"></div>
      </div>

      <h2>Welcome Back</h2>
     <form id="loginForm">
      <input type="email" id="email" placeholder="Email" required>
      <input type="password" id="password" placeholder="Password" required minlength="4">
      <p id="errorMsg"></p>

      <div class="options">
        <label>
          <input type="checkbox" id="remember"> Remember me
        </label>
        <a href="#">Forgot password?</a>
      </div>
      <button type="submit" class="login-btn">Login</button>
     </form>
      <p class="divider">OR</p>

      <button class="social apple"> <img src="Images/apple.svg" alt="apple"></button>
      <button class="social google"><img src="Images/search.png" alt="google"></button>

    </div>

  </div>
  <script src="login.js"></script>

</body>
</html>
